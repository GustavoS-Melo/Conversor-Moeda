<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Moedas</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <div class="converter-box">
            <h2>Conversor de Moedas</h2>
            <label for="">Digite o valor que deseja converter:</label>
            <input type="number" id="amount" placeholder="Valor" value="1">
            <span>Escolha a moeda de origem:</span>
            
            <div class="selectors">
                <select id="fromCurrency">
                    <option value="USD">Dólar (USD)</option>
                    <option value="EUR">Euro (EUR)</option>
                    <option value="GBP">Libra (GBP)</option>
                    <option value="JPY">Iene (JPY)</option>
                    <option value="AUD">Dólar Australiano (AUD)</option>
                    <option value="BRL">Real Brasileiro (BRL)</option>
                </select>
                <span>Escolha a moeda de destino:</span>
                <select id="toCurrency">
                    <option value="BRL">Real Brasileiro (BRL)</option>
                    <option value="EUR">Euro (EUR)</option>
                    <option value="GBP">Libra (GBP)</option>
                    <option value="JPY">Iene (JPY)</option>
                    <option value="AUD">Dólar Australiano (AUD)</option>
                    <option value="USD">Dólar (USD)</option>
                </select>
            </div>

            <button id="convertBtn">Converter</button>
            <div id="result">Resultado:</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
